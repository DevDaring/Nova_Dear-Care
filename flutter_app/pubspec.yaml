name: fit_u
description: Fit-U — Health Companion for Dear-Care AI Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Sensor & Health Data
  pedometer: ^4.0.0
  geolocator: ^11.0.0
  sensors_plus: ^4.0.0

  # AWS Integration
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0

  # UI
  fl_chart: ^0.68.0
  provider: ^6.1.0
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
